name: iqra_academy
description: Iqra Academy — Quran Learning App for iOS & Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.2

  # Auth
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  gap: ^3.0.1

  # Jitsi (video calls via WebView)
  flutter_inappwebview: ^6.1.5

  # Push Notifications
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1

  # Utils
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.3
  freezed: ^2.5.8
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.2.2

flutter:
  uses-material-design: true

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
