name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Dummy values for build-time validation (if needed)
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          BETTER_AUTH_SECRET: "dummy-secret-for-build"
